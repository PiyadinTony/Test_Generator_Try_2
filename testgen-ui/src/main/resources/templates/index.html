<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Test Generator MVP v0.1</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    table { border-collapse: collapse; width: 100%; margin-top: 8px; }
    th, td { border: 1px solid #ddd; padding: 8px; vertical-align: top; }
    .grid { display: grid; grid-template-columns: 220px 1fr; gap: 8px 12px; max-width: 900px; }
    .error { color: #b00020; margin: 4px 0; }
    .actions { margin-top: 16px; display: flex; gap: 10px; }
    pre { background: #f5f5f5; padding: 12px; overflow-x: auto; }
  </style>
</head>
<body>
<h1>Test Generator MVP v0.1</h1>

<form method="post" th:action="@{/preview}" th:object="${form}">
  <div class="grid">
    <label for="packageName">packageName</label>
    <div>
      <input id="packageName" type="text" th:field="*{packageName}" style="width:100%">
      <div class="error" th:if="${#fields.hasErrors('packageName')}" th:errors="*{packageName}"></div>
    </div>

    <label for="className">className</label>
    <div>
      <input id="className" type="text" th:field="*{className}" style="width:100%">
      <div class="error" th:if="${#fields.hasErrors('className')}" th:errors="*{className}"></div>
    </div>

    <label for="testName">testName</label>
    <div>
      <input id="testName" type="text" th:field="*{testName}" style="width:100%">
      <div class="error" th:if="${#fields.hasErrors('testName')}" th:errors="*{testName}"></div>
    </div>

    <label for="regionId">regionId</label>
    <div>
      <input id="regionId" type="text" th:field="*{regionId}" style="width:100%">
      <div class="error" th:if="${#fields.hasErrors('regionId')}" th:errors="*{regionId}"></div>
    </div>

    <label for="project">project</label>
    <input id="project" type="text" th:field="*{project}">

    <label for="testType">testType</label>
    <input id="testType" type="text" th:field="*{testType}">

    <label for="env">env</label>
    <input id="env" type="text" th:field="*{env}">

    <label for="testSubject">testSubject</label>
    <input id="testSubject" type="text" th:field="*{testSubject}">

    <label for="testLevel">testLevel</label>
    <input id="testLevel" type="text" th:field="*{testLevel}">

    <label for="apiService">apiService</label>
    <input id="apiService" type="text" th:field="*{apiService}">
  </div>

  <h2>Steps</h2>
  <table>
    <thead>
    <tr>
      <th>Title</th>
      <th>Type</th>
      <th>Expected Result</th>
      <th>Auto Command</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="step,iter : *{steps}">
      <td><input type="text" th:field="*{steps[__${iter.index}__].title}" style="width:100%"></td>
      <td>
        <select th:field="*{steps[__${iter.index}__].type}">
          <option th:each="type : ${stepTypes}" th:value="${type}" th:text="${type}"></option>
        </select>
      </td>
      <td><input type="text" th:field="*{steps[__${iter.index}__].expectedResult}" style="width:100%"></td>
      <td><input type="text" th:field="*{steps[__${iter.index}__].autoCommand}" style="width:100%"></td>
    </tr>
    </tbody>
  </table>

  <div class="actions">
    <button type="submit" formaction="/preview">Preview</button>
    <button type="submit" formaction="/download">Download .java</button>
  </div>
</form>

<div th:if="${preview != null}">
  <h2>Generated Java Preview</h2>
  <pre th:text="${preview}"></pre>
</div>
</body>
</html>
