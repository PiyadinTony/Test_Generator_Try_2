plugins {
  id 'base'
}

allprojects {
  group = 'org.vtb.testgen'
  version = '0.1.0'

  repositories {
    mavenCentral()
  }
}

subprojects {
  apply plugin: 'java'

  java {
    toolchain {
      languageVersion = JavaLanguageVersion.of(21)
    }
  }

  tasks.withType(Test).configureEach {
    useJUnitPlatform()
  }
}
